; Edge Pong smart paddle firmware (ESP32-S3).
; Arduino-ESP32 framework for weekend speed (spec §7.1). Swap to ESP-IDF for
; more deterministic timing if needed.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=2
lib_deps =
    fastled/FastLED @ ^3.6.0
    ; add your IMU driver here, e.g. bosch BMI270 / ICM-42688 / MPU-6050
