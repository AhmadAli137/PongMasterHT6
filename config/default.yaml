system:
  mode: arcade
  log_level: INFO
  metrics_enabled: true
  # "sim" runs the whole pipeline with mocks (no hardware). "hardware" wires the
  # real camera + ESP32 paddle.
  hardware_mode: sim

camera:
  device: /dev/video0
  width: 1280
  height: 720
  fps: 60
  pixel_format: MJPG
  exposure_mode: manual
  exposure_value: -6
  # sim sensor noise — calm defaults for a smooth feel; raise these to
  # stress-test tracking robustness (e.g. jitter 0.004 / dropout 0.02)
  sim_jitter_m: 0.0015
  sim_latency_ms: 20.0
  sim_dropout_prob: 0.004

apriltag:
  family: tagStandard41h12
  tag_size_m: 0.115
  quad_decimate: 1.5
  max_hamming: 1

paddle:
  telemetry_port: 46000
  command_host: 127.0.0.1
  command_port: 46001
  discovery_port: 46002
  stale_ms: 100
  disconnected_ms: 1000
  max_prediction_ms: 120
  sim_enabled: true
  sim_autoplay: true
  sim_packet_rate_hz: 100

fusion:
  camera_position_alpha: 0.65
  camera_orientation_alpha: 0.25
  imu_orientation_weight: 0.80
  max_angular_prediction_ms: 45.0
  output_rate_hz: 240

game:
  physics_rate_hz: 240
  round_duration_s: 75
  countdown_s: 3
  paddle_width_m: 0.19
  paddle_height_m: 0.19
  paddle_thickness_m: 0.015
  collision_scale_easy: 1.55
  collision_scale_normal: 1.18
  collision_scale_hard: 1.05
  hit_grace_ms: 42
  min_swing_speed_rad_s: 0.8
  max_ball_count: 3
  difficulty: EASY
  wall_z_m: 0.0
  player_z_m: 2.0
  paddle_plane_z_m: 1.8

haptics:
  # min_intensity is the floor for the weakest felt hit. Firmware maps
  # intensity -> duty as (intensity * MAX_DUTY_PCT=70), so 0.30 -> ~21% duty,
  # just above the measured coin-ERM stiction point (~18-20% duty). Below this
  # a light tap wouldn't overcome static friction and wouldn't be felt.
  min_intensity: 0.30
  max_intensity: 1.0
  min_duration_ms: 22
  max_duration_ms: 65
  perfect_multiplier: 1.15

renderer:
  http_port: 8080
  websocket_port: 8081
  metrics_port: 8082
  state_rate_hz: 60
  projector_latency_compensation_ms: 25.0
